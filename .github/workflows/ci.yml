name: CI

# Per-PR safety net: fmt + clippy + test on every OS we ship to.
# Release-time builds live in release.yml; this is the pre-merge gate
# that keeps main green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # Run fmt on both OSes: rustfmt only sees the cfg-gated
          # source for the platform it runs on, so a macOS-only block
          # stays unchecked until fmt runs on macOS too.
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  check:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # OS matrix mirrors release.yml's platform set: every OS we
          # ship binaries for gets a per-PR gate too.
          - ubuntu-24.04
          - macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Scope rust-cache to the runner image
        # ImageVersion changes whenever GitHub refreshes the runner
        # image — which is also when preinstalled / Homebrew libs
        # (notably glib + gtk4) move. Folding it into the cache key
        # stops a cached build script's baked-in `-L .../Cellar/
        # <pkg>/<ver>/lib` from outliving the Cellar dir it points
        # at (`ld: library '...' not found`).
        shell: bash
        run: echo "CACHE_IMAGE=${ImageOS:-}-${ImageVersion:-}" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.CACHE_IMAGE }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        # Same set release.yml installs for the Linux tarball builds.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig-dev \
            libfreetype-dev \
            libgl-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libpipewire-0.3-dev

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features
