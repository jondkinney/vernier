name: release-x86_64

# Fires whenever release.sh publishes a new GitHub Release. Builds
# the x86_64 Linux tarball that aur-bin / generic Linux users pull
# from. Also exposed via workflow_dispatch so we can backfill an old
# tag if this workflow was added later, or rerun a failed build
# without cutting a new version.
#
# Before this workflow existed, release.sh built the x86_64 tarball
# locally on the maintainer's Linux box. Moving the build into CI
# means a macOS-only release flow can produce every Linux artifact
# the AUR PKGBUILDs need.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.2.0)'
        required: true
        type: string

jobs:
  build:
    name: Build x86_64 binary + upload to Release
    runs-on: ubuntu-24.04
    permissions:
      # gh release upload writes to the release assets.
      contents: write
    steps:
      - name: Resolve target tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building for tag=$TAG version=$VERSION"

      - name: Checkout source at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig-dev \
            libfreetype-dev \
            libgl-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libpipewire-0.3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        env:
          # Mirror release.sh + release-aarch64: strip workspace + cargo
          # paths out of the binary so backtraces don't carry the
          # runner's directory layout into the shipped artifact.
          RUSTFLAGS: --remap-path-prefix=${{ github.workspace }}=/build --remap-path-prefix=/home/runner/.cargo=/cargo
        run: cargo build --release --bin vernier

      - name: Stage prebuilt tarball
        id: stage
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          NAME="vernier-${VERSION}-x86_64"
          STAGE="$RUNNER_TEMP/$NAME"
          install -d "$STAGE/icons"
          install -m755 target/release/vernier      "$STAGE/vernier"
          install -m644 packaging/vernier.desktop   "$STAGE/vernier.desktop"
          install -m644 README.md                   "$STAGE/README.md"
          install -m644 LICENSE-MIT                 "$STAGE/LICENSE-MIT"
          install -m644 LICENSE-APACHE              "$STAGE/LICENSE-APACHE"
          cp -r assets/icons/hicolor/.              "$STAGE/icons/"
          # status/ icons stay out for the same reason as release.sh —
          # SNI clients should fall through to icon_pixmap.
          rm -rf "$STAGE"/icons/*/status
          TARBALL="$RUNNER_TEMP/$NAME.tar.gz"
          tar -C "$RUNNER_TEMP" -czf "$TARBALL" "$NAME"
          sha256sum "$TARBALL"
          echo "path=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "${{ steps.stage.outputs.path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
