<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Top scale: 6 ticks, dense -->
  <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <line x1="3" y1="9" x2="21" y2="9"/>
    <line x1="3" y1="6" x2="3" y2="9"/>
    <line x1="6.6" y1="7.5" x2="6.6" y2="9"/>
    <line x1="10.2" y1="7.5" x2="10.2" y2="9"/>
    <line x1="12" y1="6" x2="12" y2="9"/>
    <line x1="13.8" y1="7.5" x2="13.8" y2="9"/>
    <line x1="17.4" y1="7.5" x2="17.4" y2="9"/>
    <line x1="21" y1="6" x2="21" y2="9"/>
  </g>

  <!-- Bottom scale: 3 ticks, sparse -->
  <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <line x1="5" y1="15" x2="19" y2="15"/>
    <line x1="5" y1="15" x2="5" y2="18"/>
    <line x1="12" y1="15" x2="12" y2="18"/>
    <line x1="19" y1="15" x2="19" y2="18"/>
  </g>

  <!-- Alignment line -->
  <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
